apiVersion: apps/v1
kind: Deployment

metadata:
  name: swiggy-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: swiggy

  template:
    metadata:
      labels:
        app: swiggy

    spec:
      containers:
      - name: swiggy
        image: sruthi9sirasati/swiggyapp:latest

        ports:
        - containerPort: 3000
